<!DOCTYPE html>
<html lang="en">
<head>
    <title>Display a map</title>
    <meta property="og:description" content="Initialize a map in an HTML element with MapLibre GL JS." />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css' />
    <link rel='stylesheet' href='style.css' />
    
        <script src='https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js'></script>
    
        <script src='map.js'></script>

        <script src="notam-parser.js"></script>

       

</head>
<body>
    <div id="map"></div>

    <div id="form-container">

        <h1>JOSE'S NOTAM</h1>

        <h2>Mark for Specific Coordinate</h2>

        <label for="lat-field">Latitude:</label>
        <input type="text" id="lat-field" placeholder="ie: 40.4168">
        
        
        <label for="lon-field">Longitude:</label>
        <input type="text" id="lon-field" placeholder="ie: 40.4168">
        
        <button id="btn-map-mark">Enter coordinates</button>

        <h2>NOTAUMATIC</h2>

        <textarea id="notam-input" rows="5" placeholder="Paste Here NOTAM..."></textarea>
        <button id="btn-analyzer">Analyze and Show Map</button>

    </div>
</body>
</html>
