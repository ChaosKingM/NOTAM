<!DOCTYPE html>
<html lang="en">

<head>
    <title>SKYJOS NOTAM</title>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css' />
    <link rel='stylesheet' href='style.css' />

    <script src='https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js'></script>
    <script src="notam-parser.js"></script>
    <script src='map.js'></script>
</head>

<body>
    <div id="map"></div>

    <div id="info-panel" class="sidebar">
        <div id="notam-navigation" class="nav-controls" style="display: none;">
            <button id="btn-prev-notam">◀</button>
            <span id="notam-counter">1 of 1</span>
            <button id="btn-next-notam">▶</button>
        </div>
        <h3 id="info-type">NOTAM INFO</h3>
        <p id="info-coords">Coordinates: --</p>
        <p id="info-alt">Altitude: --</p>
        <p id="info-date">Dates: --</p>
        <button id="btn-copy" class="secondary-btn">Copy JSON</button>
        <button id="btn-download" class="secondary-btn">Download CSV</button>
    </div>

    <div id="form-container">
        <h1>SKYJOS</h1>

        <h2>NOTAM Analyzer</h2>
        <textarea id="notam-input" rows="6"
            placeholder="Paste NOTAM text here... (Example: !PNM 07/580 ZMP OBST...)"></textarea>
        <button id="btn-analyzer">Analyze & Plot Area</button>

        <div class="collapsible-header collapsed" onclick="toggleSection('quick-mark-content')">
            <h2>Quick Mark</h2>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="quick-mark-content" class="collapsible-content collapsed">
            <div class="filter-group">
                <div>
                    <label>Lat</label>
                    <input type="text" id="lat-field" placeholder="44.2334">
                </div>
                <div>
                    <label>Lon</label>
                    <input type="text" id="lon-field" placeholder="-98.4821">
                </div>
            </div>
            <button id="btn-map-mark">Fly to Coord</button>
        </div>

        <div class="collapsible-header collapsed" onclick="toggleSection('filters-content')">
            <h2>Filters</h2>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="filters-content" class="collapsible-content collapsed">
            <label>Min Altitude (FT)</label>
            <input type="number" id="filter-alt" value="0">

            <label>Date Range (YYMMDD)</label>
            <div class="filter-group">
                <input type="text" id="filter-date-start" placeholder="Start">
                <input type="text" id="filter-date-end" placeholder="End">
            </div>
        </div>

        <button class="secondary-btn" id="btn-toggle-view">Switch Satellite/OSM</button>
    </div>
</body>

</html>
